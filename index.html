<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b2045">
  <link rel="manifest" href="manifest.json">
  <title>JKASW Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b2045; }

    #splash {
      position: fixed;
      inset: 0;
      background: #0b2045;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #splash img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 24px;
      border-radius: 16px;
    }

    #splash .welcome {
      color: #f5a623;
      font-family: sans-serif;
      font-size: 15px;
      margin-bottom: 6px;
    }

    #splash .title {
      color: #ffffff;
      font-family: sans-serif;
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    #splash .subtitle {
      color: #f5a623;
      font-family: sans-serif;
      font-size: 13px;
    }

    #splash .credit {
      position: absolute;
      bottom: 24px;
      color: #88aabb;
      font-family: sans-serif;
      font-size: 11px;
    }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    iframe.loaded { opacity: 1; }
  </style>
</head>
<body>

  <div id="splash">
    <img src="https://drive.google.com/thumbnail?id=1wY39imvIBRTdqvVhl19tR-CwukB7RJ2j" alt="JKASW Logo">
    <div class="welcome">Welcome to</div>
    <div class="title">JKASW</div>
    <div class="subtitle">Leaves Management Portal</div>
    <div class="credit">Developed by K-eStudio</div>
  </div>

  <iframe id="appFrame"
    allow="camera; microphone; geolocation; clipboard-write">
  </iframe>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzBcpXpYBjVfiyv9pcEIoq98Ky-_W9lKrMs4p4qlYQbXGwxeUQK0hw51XFoQwq3hnl7w/exec";

    var email = localStorage.getItem('jkasw_email');
    var pass  = localStorage.getItem('jkasw_pass');

    var frame = document.getElementById('appFrame');

    if(email && pass){
      frame.src = SCRIPT_URL + '?email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(pass);
    } else {
      frame.src = SCRIPT_URL;
    }

    // Hide splash after 2.5 seconds
    setTimeout(function(){
      document.getElementById('splash').style.display = 'none';
      frame.classList.add('loaded');
    }, 2500);

    window.addEventListener('message', function(e){
      if(!e.data || !e.data.type) return;
      if(e.data.type === 'SAVE_LOGIN'){
        localStorage.setItem('jkasw_email', e.data.email);
        localStorage.setItem('jkasw_pass',  e.data.pass);
      }
      if(e.data.type === 'CLEAR_LOGIN'){
        localStorage.removeItem('jkasw_email');
        localStorage.removeItem('jkasw_pass');
      }
    });

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
