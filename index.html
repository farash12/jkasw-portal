<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b2045">
  <link rel="manifest" href="manifest.json">
  <title>JKASW Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b2045; }
    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="appFrame"
    allow="camera; microphone; geolocation; clipboard-write">
  </iframe>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2EXiaxlytR8j3wAJ46m9iYwqyy43apFIEKn929snlfR4OjFBBvYUx4HFeuNBg1i_0hg/exec";

    var email = localStorage.getItem('jkasw_email');
    var pass  = localStorage.getItem('jkasw_pass');

    if(email && pass){
      document.getElementById('appFrame').src = SCRIPT_URL + '?email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(pass);
    } else {
      document.getElementById('appFrame').src = SCRIPT_URL;
    }

    // Listen for messages from iframe
    window.addEventListener('message', function(e){
      if(!e.data || !e.data.type) return;
      if(e.data.type === 'SAVE_LOGIN'){
        localStorage.setItem('jkasw_email', e.data.email);
        localStorage.setItem('jkasw_pass',  e.data.pass);
      }
      if(e.data.type === 'CLEAR_LOGIN'){
        localStorage.removeItem('jkasw_email');
        localStorage.removeItem('jkasw_pass');
      }
    });

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
