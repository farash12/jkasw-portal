<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b2045">
  <link rel="manifest" href="manifest.json">
  <title>JKASW Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0b2045; 
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: white;
    }
  </style>
</head>
<body>
  <p>Loading...</p>
  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2EXiaxlytR8j3wAJ46m9iYwqyy43apFIEKn929snlfR4OjFBBvYUx4HFeuNBg1i_0hg/exec";
    
    var email = localStorage.getItem('jkasw_email');
    var pass  = localStorage.getItem('jkasw_pass');
    
    if(email && pass){
      window.location.href = SCRIPT_URL + '?email=' + encodeURIComponent(email) + '&pass=' + encodeURIComponent(pass);
    } else {
      window.location.href = SCRIPT_URL;
    }

    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
